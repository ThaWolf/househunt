services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: househunt
      POSTGRES_PASSWORD: househunt
      POSTGRES_DB: househunt
    ports:
      - "5433:5432"
    volumes:
      - househunt_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U househunt -d househunt"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: "8000"
      # Compose network DB (overrides any host Railway URL in .env)
      DATABASE_URL: postgresql+asyncpg://househunt:househunt@postgres:5432/househunt
      CORS_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      # false = local-real scrap; Chromium not in image — use host API for live (see README)
      ADAPTER_USE_FIXTURES: "false"
      ADAPTER_TIMEOUT_SECONDS: "45"
      FEATURE_GOOGLE_CALENDAR: "false"
      FEATURE_GOOGLE_MAPS: "false"
      # Optional: host/.env substitution; empty = degrade (env_file also loads .env)
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      FEATURE_IMAGE_PROXY: "true"
      FEATURE_POI: "false"
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  househunt_pg:
